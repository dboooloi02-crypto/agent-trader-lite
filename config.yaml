# ============================================
# Agent Trader Lite — 配置
# 修改此文件即可自定义数据源、分析器、输出器
# ============================================

datasources:
  chain:
    - tencent
    - eastmoney_hot
    - fund_nav
  sources:
    tencent:
      codes:
        - "sh513650"
        - "sz159915"
        - "sh510300"
    eastmoney_hot:
      limit: 10
    fund_nav:
      codes:
        - "012920"

# 分析器 (选填)
# analyzers:
#   - sentiment

# 输出器 (选填)
outputters:
  - reporter
  - json_writer

json_writer:
  path: "output.json"
  indent: 2
